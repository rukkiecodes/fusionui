name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Bundle-size budgets
        run: pnpm size

      - name: Build docs
        run: pnpm --filter @fusionui/docs build
