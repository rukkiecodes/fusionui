<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FusionUI">
  <defs>
    <linearGradient id="fui-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#195bff" />
      <stop offset="1" stop-color="#7d33ff" />
    </linearGradient>
